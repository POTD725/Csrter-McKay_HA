# CARTER / McKAY SITE CONFIGURATION TEMPLATE
# Copy this file to site.conf and fill in every ENTER_HERE value.
# Never commit site.conf if it contains private information.

SITE_NAME=Atlantis Home Platform
TIMEZONE=America/Indiana/Indianapolis

# Network
LAN_CIDR=192.168.12.0/24
GATEWAY_IP=192.168.12.1
DNS_IP=192.168.12.1
ROUTER_RESERVATION_FIRST=ENTER_HERE
ROUTER_RESERVATION_LAST=ENTER_HERE

# Proxmox hosts
CARTER_HOSTNAME=carter
CARTER_HOST_IP=ENTER_HERE
MCKAY_HOSTNAME=mckay
MCKAY_HOST_IP=ENTER_HERE
PROXMOX_PREFIX=24

# Shared service addresses. McKAY reuses these only during failover.
HOME_ASSISTANT_IP=ENTER_HERE
PBX_IP=ENTER_HERE

# Virtual machines
HOME_ASSISTANT_VM_ID=100
PBX_VM_ID=110
HOME_ASSISTANT_RAM_MB=2048
PBX_RAM_MB=4096
PBX_CPU_CORES=2

# Storage and installer safety
PROXMOX_STORAGE=local-lvm
TARGET_DISK_FILTER_KEY=ID_SERIAL_SHORT
TARGET_DISK_FILTER_VALUE=ENTER_HERE

# Local information screen
ATLANTIS_KIOSK_URL=http://ENTER_HOME_ASSISTANT_IP:8123/ENTER_DASHBOARD_PATH
KIOSK_USER=atlantis-display

# Local media file names supplied later
WINDOWS_11_ISO=ENTER_HERE.iso
VIRTIO_ISO=virtio-win.iso
HOME_ASSISTANT_BACKUP=ENTER_HERE.tar
PBX_EXPORT_FOLDER=ENTER_HERE

# Backup and failover
BACKUP_HOUR=2
BACKUP_MINUTE=30
KEEP_LOCAL_BACKUPS=7
KEEP_STANDBY_BACKUPS=3
